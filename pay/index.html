<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pay Invoice</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --mahogany:#5B2D22; --pecan:#9F6640; --russet:#7A4A10; --cloud:#F3E8D6; --bg:#FAF6EE;
    --border:#bfb19a; --rule:#2a1e15; --text-dark:#1a1108; --text-mid:#4a3a2a; --text-light:#8a7a68;
    --font-h:'Oswald', sans-serif;
    --font-b:'Courier New', Courier, monospace;
  }
  * { box-sizing: border-box; }
  body { margin:0; font-family:var(--font-b); font-weight:700; background:var(--bg); color:var(--text-dark); min-height:100vh; line-height:1.4; }
  .doc { max-width:820px; margin:24px auto; background:white; border:1px solid var(--border); position:relative; overflow:hidden; }
  .doc-inner { padding:36px 44px; position:relative; z-index:2; }
  .watermark { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none; z-index:1; }
  .watermark img { max-width:55%; max-height:55%; }

  .hdr { display:grid; grid-template-columns:1fr 1fr 1fr; gap:24px; padding-bottom:18px; }
  .hdr .brand .logo-img { max-height:70px; max-width:200px; display:block; margin-bottom:8px; }
  .hdr .brand .name { font-family:var(--font-h); font-weight:600; font-size:22px; color:var(--mahogany); text-transform:uppercase; letter-spacing:.08em; margin-bottom:4px; }
  .hdr .brand .sub  { font-size:11px; color:var(--text-mid); line-height:1.6; white-space:pre-wrap; }
  .hdr .center { text-align:center; }
  .hdr .center .invoice-label { font-family:var(--font-h); font-weight:600; font-size:18px; letter-spacing:.2em; color:var(--text-dark); margin-bottom:14px; }
  .hdr .right { font-size:11px; color:var(--text-mid); line-height:1.6; }
  .hdr .right .bill-name { font-weight:700; color:var(--text-dark); font-size:12px; margin-bottom:2px; }

  .rule { border:0; border-top:1px solid var(--rule); margin:0; }
  .rule-thin { border:0; border-top:1px solid var(--border); margin:0; }

  .meta-row { display:flex; flex-wrap:wrap; justify-content:space-between; gap:16px; padding:8px 0; font-size:11px; color:var(--text-mid); }
  .meta-row span strong { color:var(--text-dark); font-weight:700; }

  .table { width:100%; border-collapse:collapse; margin-top:0; }
  .table th { font-family:var(--font-h); font-weight:500; font-size:11px; letter-spacing:.12em; text-transform:uppercase; text-align:left; color:var(--text-dark); padding:10px 14px 10px 0; border-bottom:1px solid var(--rule); border-top:1px solid var(--rule); background:rgba(91,45,34,.02); }
  .table th.qty, .table th.amt { text-align:right; width:90px; }
  .table td { padding:12px 14px 12px 0; font-size:12px; border-bottom:1px solid var(--border); vertical-align:top; }
  .table td.qty { text-align:right; color:var(--text-mid); }
  .table td.amt { text-align:right; font-weight:700; }
  .table td .desc { font-size:11px; color:var(--text-mid); margin-top:4px; font-weight:400; white-space:pre-wrap; }
  .table td .nor { font-size:10px; color:var(--text-light); font-weight:400; margin-left:6px; }

  .totals-block { display:grid; grid-template-columns:1fr 1fr 1fr; gap:20px; padding:18px 0 8px; border-top:1px solid var(--rule); }
  .totals-block .col-label { font-family:var(--font-h); font-weight:500; font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--text-dark); margin-bottom:6px; }
  .totals-block .row { display:flex; justify-content:space-between; font-size:12px; padding:3px 0; color:var(--text-mid); }
  .totals-block .row strong { color:var(--text-dark); }
  .totals-block .total-cell { text-align:right; }
  .totals-block .total-cell .big { font-family:var(--font-h); font-weight:700; font-size:26px; color:var(--mahogany); letter-spacing:.04em; }
  .totals-block .total-cell .lbl { font-family:var(--font-h); font-weight:500; font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--text-dark); margin-bottom:2px; }

  .paid-stamp { color:#1a6e3a; font-weight:700; }
  .due-stamp  { color:#b33; font-weight:700; }

  .status-banner { font-size:12px; padding:10px 14px; margin-bottom:16px; border:1px solid; }
  .status-success { background:rgba(26,110,58,.06); border-color:rgba(26,110,58,.3); color:#1a6e3a; }
  .status-cancel  { background:rgba(196,122,32,.06); border-color:rgba(196,122,32,.3); color:#c47a20; }
  .status-paid    { background:rgba(26,110,58,.06); border-color:rgba(26,110,58,.3); color:#1a6e3a; font-weight:700; }

  .pay-section { margin-top:28px; border:1px solid var(--rule); padding:20px 24px; }
  .pay-section .lbl { font-family:var(--font-h); font-weight:500; font-size:12px; letter-spacing:.16em; text-transform:uppercase; color:var(--text-dark); margin-bottom:14px; }
  .methods { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  @media (max-width:560px) { .methods { grid-template-columns:1fr; } .hdr { grid-template-columns:1fr; gap:12px; } .hdr .center { text-align:left; } }
  .method-btn { background:white; border:1px solid var(--border); padding:16px 18px; cursor:pointer; text-align:left; font-family:inherit; color:inherit; transition:.15s; }
  .method-btn:hover { border-color:var(--mahogany); background:rgba(91,45,34,.03); }
  .method-btn .title { font-family:var(--font-h); font-weight:600; font-size:14px; color:var(--mahogany); text-transform:uppercase; letter-spacing:.08em; }
  .method-btn .sub { font-size:11px; color:var(--text-mid); margin-top:3px; font-weight:400; }
  .method-btn .fee { font-size:11px; color:var(--text-light); margin-top:2px; font-weight:400; }
  .info-box { background:rgba(91,45,34,.03); border:1px solid var(--border); padding:14px 18px; white-space:pre-wrap; font-family:var(--font-b); font-weight:700; font-size:12px; line-height:1.6; color:var(--text-dark); margin-top:12px; }

  .footer { text-align:center; font-size:10px; color:var(--text-light); margin:24px auto; max-width:820px; padding:0 44px; line-height:1.6; font-weight:400; }
  a { color:var(--russet); }

  .loading, .error { text-align:center; padding:80px 20px; color:var(--text-mid); font-size:13px; }
  .error { color:#b33; }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../supabase-config.js"></script>
</head>
<body>
<div id="preview-banner" style="display:none;position:sticky;top:0;z-index:50;background:#5B2D22;color:#fff;text-align:center;padding:10px 16px;font-family:'Oswald',sans-serif;font-weight:600;font-size:12px;letter-spacing:.14em;text-transform:uppercase">
  Preview Mode — this is what your client sees
</div>
<div id="root">
  <div class="loading">Loading invoice…</div>
</div>

<script>
const params = new URLSearchParams(location.search);
const token = params.get('t');
const status = params.get('status');
const isPreview = params.get('preview') === '1';
if (isPreview) document.getElementById('preview-banner').style.display = 'block';

const SB_URL = window.BEEP_SUPABASE_CONFIG?.url;
const SB_KEY = window.BEEP_SUPABASE_CONFIG?.anonKey;

function fmt(n) { return '$' + (Number(n)||0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
function escH(s) { return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

async function loadInvoice() {
  if (!token) { document.getElementById('root').innerHTML = '<div class="error">Missing payment link token.</div>'; return; }
  try {
    const r = await fetch(`${SB_URL}/functions/v1/get-invoice-for-payment?t=${encodeURIComponent(token)}`, {
      headers: { 'Authorization': 'Bearer ' + SB_KEY, 'apikey': SB_KEY },
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Could not load invoice.');
    render(data);
  } catch (e) {
    document.getElementById('root').innerHTML = `<div class="error">${escH(e.message)}</div>`;
  }
}

function render(d) {
  const { invoice, studio, project, client } = d;
  const si = studio.info || {};
  const isPaid = invoice.amount_due <= 0.01;
  const ccFee = invoice.cc_fee_pct || 3.5;

  const brandHtml = `
    <div class="brand">
      ${studio.logo_url ? `<img class="logo-img" src="${escH(studio.logo_url)}" alt="${escH(studio.name)}">` : ''}
      <div class="name">${escH(studio.name || 'Studio')}</div>
      <div class="sub">${[si.address1, si.address2, si.phone, si.email, si.website].filter(Boolean).map(escH).join('\n')}</div>
    </div>`;

  const centerHtml = `
    <div class="center">
      <div class="invoice-label">INVOICE</div>
      ${project ? `<div class="bill-name" style="font-family:var(--font-h);font-weight:500;font-size:14px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dark)">${escH(project.name)}</div>` : ''}
    </div>`;

  const projectAddress = project?.address ? escH(project.address) : '';
  const rightHtml = `
    <div class="right" style="text-align:right">
      ${projectAddress ? `<div style="margin-bottom:8px;white-space:pre-wrap">${projectAddress}</div>` : ''}
      ${client ? `
        <div class="bill-name" style="font-size:12px">${escH(client.name || '')}</div>
        ${client.email ? `<div>${escH(client.email)}</div>` : ''}
        ${client.phone ? `<div>${escH(client.phone)}</div>` : ''}
      ` : ''}
    </div>`;

  const metaRow = `
    <div class="meta-row">
      <span>Page No: <strong>1/1</strong></span>
      ${invoice.sent_date ? `<span>Issued: <strong>${escH(invoice.sent_date)}</strong></span>` : ''}
      ${invoice.due_date  ? `<span>Due: <strong>${escH(invoice.due_date)}</strong></span>` : ''}
      <span>Invoice No: <strong>${escH(invoice.number || '')}</strong></span>
    </div>`;

  // Credit reconciliation lines render as their own row in the totals
  // block (not in the items list).
  const itemLines = invoice.line_items.filter(l => l._reconType !== 'credit');
  const creditLines = invoice.line_items.filter(l => l._reconType === 'credit');
  const itemsBody = itemLines.map(l => {
    const total = (l.qty || 1) * (l.price || 0);
    return `<tr>
      <td>
        <div><strong>${escH(l.name)}</strong></div>
        ${l.description ? `<div class="desc">${escH(l.description)}</div>` : ''}
        <div class="desc">${l.qty || 1} × ${fmt(l.price || 0)}</div>
      </td>
      <td class="qty">${l.qty || 1}</td>
      <td class="amt">${fmt(total)}</td>
    </tr>`;
  }).join('');
  const creditSum = creditLines.reduce((s, c) => s + (Number(c.qty)||1) * (Number(c.price)||0), 0);

  const taxAmount = Number(invoice.tax || 0);
  // Subtotal here is line items only (matches the invoice builder). Freight,
  // adjacent charges, discount, and credits each render as their own row
  // below so the math from Subtotal → Total is transparent.
  const subtotal = Number(invoice.subtotal || 0);

  let statusBanner = '';
  if (isPaid) statusBanner = '<div class="status-banner status-paid">✓ This invoice has been paid in full. Thank you.</div>';
  else if (status === 'success') statusBanner = '<div class="status-banner status-success">Payment submitted. It may take a moment to reflect below.</div>';
  else if (status === 'cancel')  statusBanner = '<div class="status-banner status-cancel">Payment cancelled. You can try again below.</div>';

  const notesHtml = invoice.notes ? `
    <div style="padding:16px 0;border-top:1px solid var(--border)">
      <div style="font-family:var(--font-h);font-weight:500;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dark);margin-bottom:8px">Notes</div>
      <div style="font-family:var(--font-b);font-weight:700;font-size:12px;color:var(--text-dark);line-height:1.6;white-space:pre-wrap">${escH(invoice.notes)}</div>
    </div>` : '';

  const paymentsHtml = (invoice.payments||[]).length ? `
    <div style="padding:16px 0">
      <div style="font-family:var(--font-h);font-weight:500;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dark);margin-bottom:8px">Payments Received</div>
      <table class="table">
        <tbody>
          ${invoice.payments.map(p => `<tr>
            <td>${escH(p.date)}${p.method?' · '+escH(p.method):''}</td>
            <td class="qty"></td>
            <td class="amt paid-stamp">${fmt(p.amount)}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>` : '';

  const methodsHtml = isPaid ? '' : `
    <div class="pay-section">
      <div class="lbl">Choose how to pay</div>
      <div class="methods">
        <button class="method-btn" onclick="pay('ach')">
          <div class="title">ACH Bank Transfer</div>
          <div class="sub">Direct from your bank account</div>
          <div class="fee" style="color:#1a6e3a">No fee · ${fmt(invoice.amount_due)}</div>
        </button>
        <button class="method-btn" onclick="pay('card')">
          <div class="title">Credit / Debit Card</div>
          <div class="sub">Card processing fee applies</div>
          <div class="fee">+${ccFee}% · ${fmt(invoice.amount_due * (1 + ccFee/100))} total</div>
        </button>
        ${si.wireInstructions ? `<button class="method-btn" onclick="showInfo('wire')">
          <div class="title">Wire Transfer</div>
          <div class="sub">Direct bank wire</div>
          <div class="fee" style="color:#1a6e3a">No fee · ${fmt(invoice.amount_due)}</div>
        </button>` : ''}
        ${si.checkMailingAddress ? `<button class="method-btn" onclick="showInfo('check')">
          <div class="title">Mail a Check</div>
          <div class="sub">Pay by mail</div>
          <div class="fee" style="color:#1a6e3a">No fee · ${fmt(invoice.amount_due)}</div>
        </button>` : ''}
      </div>
      <div id="info-wire" style="display:none;margin-top:14px">
        <div class="info-box">${escH(si.wireInstructions || '')}</div>
        <div style="font-size:10px;color:var(--text-light);margin-top:6px;font-weight:400">Reference invoice ${escH(invoice.number||'')} in your wire memo.</div>
      </div>
      <div id="info-check" style="display:none;margin-top:14px">
        <div class="info-box">${escH(si.checkMailingAddress || '')}</div>
        <div style="font-size:10px;color:var(--text-light);margin-top:6px;font-weight:400">Reference invoice ${escH(invoice.number||'')} on your check. Marked paid once received.</div>
      </div>
    </div>`;

  document.getElementById('root').innerHTML = `
    <div class="doc">
      ${studio.watermark_url ? `<div class="watermark" style="opacity:${studio.watermark_opacity ?? 0.05}"><img src="${escH(studio.watermark_url)}" alt=""></div>` : ''}
      <div class="doc-inner">
        ${statusBanner}

        <div class="hdr">
          ${brandHtml}
          ${centerHtml}
          ${rightHtml}
        </div>

        <hr class="rule-thin">
        ${metaRow}
        <hr class="rule-thin">

        <table class="table">
          <thead>
            <tr>
              <th>Description</th>
              <th class="qty">Qty</th>
              <th class="amt">Amount</th>
            </tr>
          </thead>
          <tbody>${itemsBody || '<tr><td colspan="3" style="color:var(--text-light);font-style:italic">No line items.</td></tr>'}</tbody>
        </table>

        <div class="totals-block">
          <div>
            ${invoice.tax_rate ? `
              <div class="col-label">Rate</div>
              <div class="row"><span>TAX</span><span>${invoice.tax_rate}%</span></div>
            ` : ''}
            ${invoice.freight ? `<div class="row"><span>Freight</span><span>${fmt(invoice.freight)}</span></div>` : ''}
            ${invoice.adjacent_charges ? `<div class="row"><span>Other associated charges</span><span>${fmt(invoice.adjacent_charges)}</span></div>` : ''}
            ${invoice.discount ? `<div class="row"><span>Discount</span><span>-${fmt(invoice.discount)}</span></div>` : ''}
            ${creditSum < -0.005 ? `<div class="row"><span>Credit applied</span><span>-${fmt(Math.abs(creditSum))}</span></div>` : ''}
          </div>
          <div>
            <div class="col-label">Amount</div>
            <div class="row"><span>Subtotal</span><span>${fmt(subtotal)}</span></div>
            ${taxAmount ? `<div class="row"><span>Tax</span><span>${fmt(taxAmount)}</span></div>` : ''}
          </div>
          <div class="total-cell">
            <div class="lbl">Total</div>
            <div class="big">${fmt(invoice.total)}</div>
            ${invoice.amount_paid > 0 ? `<div class="row" style="margin-top:10px"><span>Paid</span><span class="paid-stamp">${fmt(invoice.amount_paid)}</span></div>` : ''}
            ${!isPaid ? `<div class="row"><span><strong>Amount Due</strong></span><span class="due-stamp">${fmt(invoice.amount_due)}</span></div>` : ''}
          </div>
        </div>

        ${notesHtml}

        ${paymentsHtml}

        ${methodsHtml}
      </div>
    </div>

    <div class="footer">
      ${escH(studio.name || 'Studio')}${si.email ? ' · ' + escH(si.email) : ''}${si.phone ? ' · ' + escH(si.phone) : ''}${si.website ? ' · ' + escH(si.website) : ''}
    </div>
  `;
}

function showInfo(which) {
  const w = document.getElementById('info-wire');
  const c = document.getElementById('info-check');
  if (w) w.style.display = which === 'wire'  ? '' : 'none';
  if (c) c.style.display = which === 'check' ? '' : 'none';
}

async function pay(method) {
  try {
    const r = await fetch(`${SB_URL}/functions/v1/create-checkout-session`, {
      method: 'POST',
      headers: { 'Content-Type':'application/json', 'Authorization': 'Bearer ' + SB_KEY, 'apikey': SB_KEY },
      body: JSON.stringify({ token, method, origin: location.origin }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Could not start checkout.');
    window.location = data.url;
  } catch (e) { alert(e.message); }
}

loadInvoice();
</script>
</body>
</html>
